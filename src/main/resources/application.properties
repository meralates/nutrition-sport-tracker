# =========================
# APP
# =========================
spring.application.name=nutrition-sport-tracker
server.port=${PORT:8080}

# =========================
# DATABASE (MySQL)
# =========================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=never

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# =========================
# TIMEZONE
# =========================
spring.jackson.time-zone=Europe/Istanbul

# =========================
# MAIL
# =========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.default-encoding=UTF-8

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# =========================
# OPENROUTER (AI)
# =========================
openrouter.api.key=${OPENROUTER_API_KEY}
openrouter.model=${OPENROUTER_MODEL:openai/gpt-4o-mini}
openrouter.temperature=${OPENROUTER_TEMPERATURE:0.6}

# =========================
# JWT
# =========================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# =========================
# USDA
# =========================
usda.base-url=https://api.nal.usda.gov/fdc
usda.api.key=${USDA_API_KEY}